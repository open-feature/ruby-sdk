name: CI

on:
  - push
  - pull_request

jobs:
  rspec:
    runs-on: ${{ matrix.os }}
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # NOTE: hold off testing other platforms until we start having native dependencies or running into issues on them
          # - macos-latest
          # - windows-latest
        ruby:
          - "4.0"
          - "3.4"
          - "head"
    continue-on-error: ${{ matrix.ruby == 'head' }}
    env:
      BUNDLE_GEMFILE: Gemfile

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - run: bundle install
      - name: RSpec
        run: bundle exec rspec
      - name: Upload coverage to Codecov
        if: ${{ strategy.job-index == 0 }} # only run codecov on first run
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
          file: coverage/coverage.xml
  standard:
    name: Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
      - run: bundle install
      - name: Standard
        run: bundle exec rake standard
  cucumber:
    runs-on: ubuntu-latest
    name: Gherkin Conformance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
      - run: bundle install
      - name: Cucumber
        run: bundle exec cucumber
  security:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
      - name: Bundle Audit
        run: bundle lock && gem install bundler-audit && bundle-audit check --update
  # check the status of other jobs, so we can have a single job dependency for branch protection
  # https://github.com/community/community/discussions/4324#discussioncomment-3477871
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [rspec, standard, cucumber, security]
    if: always()
    steps:
      - name: Successful CI
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing CI
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
